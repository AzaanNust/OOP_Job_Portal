# ================================================================
# docker-compose.yml  –  Job Portal Backend Docker Setup
# ================================================================
# This file defines two services that run together:
#   1. db  → MySQL 8 database
#   2. app → Spring Boot backend
#
# HOW TO USE:
#   Start everything:    docker-compose up --build
#   Stop everything:     docker-compose down
#   View logs:           docker-compose logs -f app
#   Reset database:      docker-compose down -v   (deletes all data)
#
# PORTS after startup:
#   Spring Boot API:   http://localhost:8080
#   Swagger UI:        http://localhost:8080/swagger-ui.html
#
# To view/manage the database, use MySQL Workbench:
#   Host: localhost  Port: 3306  User: root  Password: rootpassword123
# ================================================================

version: '3.9'

services:

  # ── MySQL Database ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: job_portal_db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: job_portal_db
      MYSQL_USER: jobportal_user
      MYSQL_PASSWORD: jobportal_pass123

    ports:
      # host:container — connect with MySQL Workbench at localhost:3306
      - "3306:3306"

    volumes:
      # Named volume: persists data across container restarts
      # Without this, ALL data is lost every time you run 'docker-compose down'
      - mysql_data:/var/lib/mysql

    # Health check: Spring Boot waits for MySQL to be ready before starting
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - jobportal_network

  # ── Spring Boot Application ────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: job_portal_app
    restart: unless-stopped

    # Wait for MySQL to be healthy before starting Spring Boot
    depends_on:
      db:
        condition: service_healthy

    environment:
      # 'db' is the service name above — Docker DNS resolves it automatically
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/job_portal_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: jobportal_user
      SPRING_DATASOURCE_PASSWORD: jobportal_pass123

      # IMPORTANT: Replace with your real JWT secret before deploying
      JWT_SECRET: JobPortalSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2024

    ports:
      - "8080:8080"

    networks:
      - jobportal_network

# ── Shared Network ─────────────────────────────────────────────
networks:
  jobportal_network:
    driver: bridge

# ── Named Volumes ──────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local