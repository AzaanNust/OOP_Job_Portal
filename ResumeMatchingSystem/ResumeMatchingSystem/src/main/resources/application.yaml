# ================================================================
# application.yml  –  Job Portal Backend Configuration
# ================================================================
# YAML uses indentation (2 spaces) to show hierarchy.
# This is cleaner than .properties files for nested config.
# ================================================================

server:
  address: 0.0.0.0
  port: 8080

spring:
  application:
    name: JobPortal-ResumeMatchingSystem

  # ── MySQL Database ─────────────────────────────────────────────
  # When running with Docker: host is 'db' (the service name in docker-compose)
  # When running locally:     host is 'localhost'
  # The SPRING_DATASOURCE_URL environment variable overrides this if set (Docker sets it)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/job_portal_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: root
    password: admin@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update      # Auto-creates/updates tables from @Entity classes
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── File Upload Size Limits ────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── JWT Configuration ──────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:JobPortalSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm2024}
  expiration: 86400000        # 24 hours in milliseconds

# ── Swagger / OpenAPI ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    OOP.JobPortal: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG